name: abm
channels:
  - conda-forge
  - defaults

dependencies:
  # Core
  - python=3.10
  - pip

  # Jupyter / dev
  - ipykernel
  - ipython
  - jupyter_client
  - jupyter_core

  # Scientific stack (let conda resolve builds)
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn

  # Utilities
  - tqdm

  # Mesa ABM
  - mesa

  # Pip extras
  - pip:
      - anndata==0.11.4
      - salib==1.5.2
      - multiprocess==0.70.19
      - dill==0.4.1
      - natsort==8.4.0